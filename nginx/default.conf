server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Keep redirects relative so the upstream HTTPS terminator (Coolify/Proxy)
  # does not trigger http<->https redirect chains.
  absolute_redirect off;
  port_in_redirect off;

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  error_page 404 /404.html;
}
